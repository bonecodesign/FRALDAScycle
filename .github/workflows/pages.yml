name: Publish Android test preview

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/web/src/**"
      - "scripts/prepare-pages.mjs"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate demonstrative app
        run: npm run verify:demo

      - name: Prepare repository-path bundle
        run: node scripts/prepare-pages.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload preview
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Publish preview
        id: deployment
        uses: actions/deploy-pages@v4
